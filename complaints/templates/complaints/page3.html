<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Complaint</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* --- ORIGINAL STYLING START (EVERY PIXEL PRESERVED) --- */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111111;
    --accent: #ffffff;
    --accent2: #cccccc;
    --green: #10b981;
    --red: #ef4444;
    --text: #ffffff;
    --text2: #888888;
    --border: rgba(255,255,255,0.1);
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Top Bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    background: rgba(17,24,39,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-brand {
    font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--text);
  }
  .topbar-brand span { color: var(--accent2); }
  .topbar-back {
    font-size: 13px; color: var(--text2);
    text-decoration: none; display: flex;
    align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .topbar-back:hover { color: var(--text); }

  /* Main Layout */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 57px);
  }

  /* LEFT PANEL */
  .left-panel {
    background: var(--surface);
    padding: 48px 48px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .panel-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent2);
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    padding: 5px 12px; border-radius: 20px;
    margin-bottom: 20px; width: fit-content;
  }

  .panel-title {
    font-family: 'Sora', sans-serif;
    font-size: 30px; font-weight: 700;
    line-height: 1.25; margin-bottom: 10px;
    color: var(--text);
  }
  .panel-title span { color: var(--accent2); }

  .panel-sub {
    font-size: 14px; color: var(--text2);
    line-height: 1.7; margin-bottom: 32px;
  }

  /* Location Bar */
  .loc-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: var(--radius);
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    color: #fca5a5; font-size: 13px; font-weight: 500;
    margin-bottom: 28px; cursor: pointer;
    transition: all 0.3s;
  }
  .loc-bar.granted {
    background: rgba(16,185,129,0.08);
    border-color: rgba(16,185,129,0.2);
    color: #6ee7b7;
  }
  .loc-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ef4444; flex-shrink: 0;
    animation: blink 1.5s infinite;
  }
  .loc-bar.granted .loc-dot { background: var(--green); animation: none; }
  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(255,255,255,0.02);
    position: relative; overflow: hidden;
    margin-bottom: 28px;
  }
  .upload-zone:hover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.06);
  }
  .upload-zone input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .upload-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .upload-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .upload-hint { font-size: 12px; color: var(--text2); }

  .preview-wrap {
    display: none; position: relative;
    margin-bottom: 28px; border-radius: var(--radius); overflow: hidden;
  }
  .preview-wrap.show { display: block; }
  .preview-wrap img {
    width: 100%; max-height: 200px;
    object-fit: cover; display: block;
  }
  .preview-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
  }
  .preview-remove {
    position: absolute; top: 10px; right: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: none;
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .preview-remove:hover { background: rgba(239,68,68,0.8); }
  .preview-label {
    position: absolute; bottom: 12px; left: 14px;
    font-size: 12px; color: rgba(255,255,255,0.7);
  }

  /* Steps indicator */
  .steps {
    display: flex; gap: 8px; margin-bottom: 28px;
  }
  .step {
    flex: 1; height: 3px; border-radius: 2px;
    background: var(--border); transition: background 0.3s;
  }
  .step.active { background: var(--accent); }
  .step.done   { background: var(--green); }

  /* RIGHT PANEL */
  .right-panel {
    background: var(--bg);
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text2); margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* Two column grid */
  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .field-full { grid-column: 1 / -1; }

  .field { display: flex; flex-direction: column; gap: 4px; }

  .field label {
    font-size: 12px; font-weight: 500;
    color: var(--text2); letter-spacing: 0.03em;
  }
  .field label .star { color: #f87171; margin-right: 2px; }

  .field input, .field select, .field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.2s, background 0.2s;
    appearance: none;
  }
  .field input::placeholder,
  .field textarea::placeholder { color: rgba(255,255,255,0.2); }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--accent);
    background: rgba(59,130,246,0.05);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: var(--surface); }

  /* Severity / Submit / Note */
  .submit-area { margin-top: auto; padding-top: 28px; }

  .note {
    font-size: 11px; color: var(--text2);
    margin-bottom: 14px;
  }
  .note .star { color: #f87171; }

  .submit-btn {
    width: 100%; padding: 14px;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.03em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(37,99,235,0.35);
    opacity: 0.5; pointer-events: none;
  }
  .submit-btn.ready {
    opacity: 1; pointer-events: auto;
  }
  .submit-btn.ready:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(37,99,235,0.45);
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    padding: 12px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transform: translateY(20px);
    transition: all 0.35s; z-index: 999;
    color: #fff; min-width: 220px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: #065f46; border: 1px solid #10b981; }
  .toast.error   { background: #7f1d1d; border: 1px solid #ef4444; }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .left-panel, .right-panel { padding: 28px 20px; }
    .field-grid { grid-template-columns: 1fr; }
    .topbar { padding: 14px 20px; }
  }
  /* --- ORIGINAL STYLING END --- */
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Complaint <span>Portal</span></div>
  <a href="page2.html" class="topbar-back">← Back to Dashboard</a>
</div>


<form method="POST" action="{% url 'report' %}" enctype="multipart/form-data" id="mainForm">
  {% csrf_token %}

  <div class="main">
    <div class="left-panel">
      <div class="panel-tag">📋 New Complaint</div>
      <h1 class="panel-title">Report a <span>Pothole</span></h1>

      <div class="steps">
        <div class="step done"   id="s1"></div>
        <div class="step active" id="s2"></div>
        <div class="step"        id="s3"></div>
      </div>

      <div class="loc-bar" id="locBar" onclick="checkLocation()">
        <span class="loc-dot" id="locDot"></span>
        <span id="locText">Click to enable location access</span>
      </div>

      <div class="upload-zone" id="uploadZone">
        <input type="file" name="image" accept="image/*" id="imgInput" required>
        <div class="upload-icon">📸</div>
        <div class="upload-title">Upload Road Photo</div>
        <div class="upload-hint">JPG, PNG up to 10MB · Click or drag & drop</div>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <img src="" id="previewImg" alt="preview"/>
        <div class="preview-overlay"></div>
        <button type="button" class="preview-remove" id="removeBtn">×</button>
        <div class="preview-label">📷 Photo attached</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="section-label">Location Details</div>
      <div class="field-grid">
        <div class="field field-full">
          <label><span class="star">*</span>Address / Road Name</label>
          <input type="text" name="address" id="addr1" placeholder="e.g. rangbhavan" oninput="validate()" required>
        </div>
        <div class="field">
          <label>Area / Colony</label>
          <input type="text" name="area" id="addr2" placeholder="Area or colony name">
        </div>
        <div class="field">
          <label><span class="star">*</span>Landmark</label>
          <input type="text" name="landmark" id="landmark" placeholder="Nearby landmark" oninput="validate()" required>
        </div>
        <div class="field">
          <label>Pin Code</label>
          <input type="text" name="pincode" id="pin" placeholder="411001" maxlength="6">
        </div>
      </div>

      <div class="section-label" style="margin-top:8px;">Your Details</div>
      <div class="field-grid">
        <div class="field">
          <label><span class="star">*</span>Full Name</label>
          <input type="text" name="name" id="userName" placeholder="name" oninput="validate()" required>
        </div>
        <div class="field">
          <label><span class="star">*</span>Phone Number</label>
          <input type="tel" name="phone" id="phone" placeholder="" maxlength="10" oninput="validate()" required>
        </div>
        <div class="field field-full">
          <label><span class="star">*</span>Email Address</label>
          <input type="email" name="email" id="email" placeholder="ABC@example.com" oninput="validate()" required>
        </div>
        <div class="field field-full">
          <label>Additional Description</label>
          <textarea name="description" id="desc" placeholder="Describe the issue in detail (optional)..."></textarea>
        </div>
      </div>

      <div class="submit-area">
        <p class="note"><span class="star">*</span> Required fields · Location access needed to submit</p>
        <button type="submit" class="submit-btn" id="submitBtn">
  Submit Complaint →
</button>
      </div>
    </div>
  </div>
</form>

<div class="toast" id="toast"></div>

<script>
  /* --- ORIGINAL LOGIC START --- */
  let locationGranted = false;

  function checkLocation() {
    if (!navigator.geolocation) { showToast('Location not supported', 'error'); return; }
    document.getElementById('locText').textContent = 'Requesting location...';
    navigator.geolocation.getCurrentPosition(
      function() {
        locationGranted = true;
        document.getElementById('locBar').classList.add('granted');
        document.getElementById('locText').textContent = '✓ Location access granted';
        validate();
      },
      function() {
        document.getElementById('locText').textContent = 'Location denied — click to retry';
        locationGranted = false;
        validate();
      }
    );
  }
  checkLocation();

  document.getElementById('imgInput').addEventListener('change', function() {
    const file = this.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewWrap').classList.add('show');
      document.getElementById('uploadZone').style.display = 'none';
      document.getElementById('s1').className = 'step done';
      validate();
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('removeBtn').addEventListener('click', function() {
    document.getElementById('imgInput').value = '';
    document.getElementById('previewWrap').classList.remove('show');
    document.getElementById('uploadZone').style.display = '';
    validate();
  });

  const required = ['addr1', 'landmark', 'userName', 'phone', 'email'];
  function validate() {
    const allFilled = required.every(id => document.getElementById(id).value.trim() !== '');
    const hasFile = document.getElementById('imgInput').files.length > 0;
    const btn = document.getElementById('submitBtn');
    if (allFilled && locationGranted && hasFile) { btn.classList.add('ready'); }
    else { btn.classList.remove('ready'); }
  }

  async function submitForm() {
    const phone = document.getElementById('phone').value.trim();
    if (!/^\d{10}$/.test(phone)) { showToast('Enter valid 10-digit phone number', 'error'); return; }

    showToast('⏳ Submitting & analyzing with AI...', 'success');
    document.getElementById('submitBtn').textContent = '⏳ Analyzing...';
    document.getElementById('submitBtn').classList.remove('ready');

    try {
      const form = document.getElementById('mainForm');
      const formData = new FormData(form);

      // Save Local Storage Values FIRST so page4 has them
      const imgSrc = document.getElementById('previewImg').src;
      if (imgSrc.startsWith('data:')) localStorage.setItem('uploadedPhoto', imgSrc);
      
      const count = parseInt(localStorage.getItem('complaint_counter') || '0') + 1;
      localStorage.setItem('complaint_counter', count);
      localStorage.setItem('complaintId', 'CD' + String(count).padStart(3,'0') + '_' + count);
      
      const now = new Date();
      localStorage.setItem('complaintDate', now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) + ' · ' + now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
      
      const descEl = document.getElementById('desc');
      if (descEl && descEl.value.trim()) localStorage.setItem('complaintDescription', descEl.value.trim());

      // AJAX Fetch to Django backend
      const res = await fetch(form.action, { 
        method: 'POST', 
        body: formData,
        headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value }
      });

      if (res.ok) {
        setTimeout(() => { window.location.href = 'page4.html'; }, 1500);
      } else {
        throw new Error('Server Error');
      }

    } catch(err) {
      console.warn('Network issue, falling back to local simulation.');
      setTimeout(() => { window.location.href = 'page4.html'; }, 1500);
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.className = 'toast ' + type; }, 3500);
  }
  /* --- ORIGINAL LOGIC END --- */
</script>
</body>
</html>
