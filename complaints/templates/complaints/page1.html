<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <style>
    body {
      background: #1f2933;
      color: white;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #243b53;
      padding: 32px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: none;
      background: #1d4ed8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
    .error {
      color: #fecaca;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="text-align:center;">Smart City Login</h2>

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <label>Role</label>
      <select name="role" required>
        <option value="citizen">Citizen</option>
        <option value="officer">SMC Officer</option>
      </select>

      <label>Email</label>
      <input type="email" name="email" placeholder="Email" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Sign In</button>
    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  </div>
</body>
</html>
